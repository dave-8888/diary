name: diary_mvp
description: A desktop-first diary MVP built with Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  audioplayers: ^5.2.1
  camera: 0.11.0+2
  camera_windows: 0.2.6+2
  cupertino_icons: ^1.0.8
  drift: ^2.18.0
  file_picker: ^8.0.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.2.2
  intl: ^0.20.2
  media_kit: 1.1.11
  media_kit_libs_video: 1.0.7
  media_kit_video: 1.2.5
  path: ^1.9.0
  path_provider: ^2.1.4
  record: ^5.1.2
  sqlite3_flutter_libs: ^0.5.26
  uuid: ^4.5.1
  crop_your_image: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  record_platform_interface: 1.2.0

flutter:
  uses-material-design: true
